# ⚠️ 警告：生产环境此文件通常由 Certbot 管理 SSL 段。
# 直接覆盖 /etc/nginx/conf.d/seele.conf 会导致 HTTPS/443 配置丢失。
# 修改时应只更新需要变更的部分（root 路径、location 等），并保留 Certbot 自动生成的 443 SSL 段。
# 详见 UPGRADE.md「部署教训」章节。

server {
    listen 80;
    server_name zhuozhenyu.cn;

    root /www/seele/frontend-dist;
    index index.html;

    # 3Mbps 带宽优化：启用 gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf
        font/x-woff;

    # 连接优化
    tcp_nodelay on;
    tcp_nopush on;
    keepalive_timeout 65;

    # 静态资源缓存（30天），减少 3Mbps 带宽重复传输
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        # HTML 不缓存，确保前端更新及时生效
        add_header Cache-Control "no-cache";
    }

    location /api/agent/chat/stream {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
    }

    location /api {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 对 API 响应也启用压缩
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
}
