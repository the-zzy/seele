name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          git diff origin/main...HEAD > pr_diff.txt || true
          if [ -s pr_diff.txt ]; then
            echo "has_diff=true" >> $GITHUB_OUTPUT
          else
            echo "has_diff=false" >> $GITHUB_OUTPUT
          fi

      - name: AI Review via Moonshot API
        if: steps.diff.outputs.has_diff == 'true'
        env:
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
        run: |
          # Truncate if too long (Moonshot has context limits)
          MAX_CHARS=30000
          if [ $(wc -c < pr_diff.txt) -gt $MAX_CHARS ]; then
            head -c $MAX_CHARS pr_diff.txt > pr_diff_truncated.txt
            printf '\n\n...[内容过长，已截断]' >> pr_diff_truncated.txt
            mv pr_diff_truncated.txt pr_diff.txt
          fi

          jq -n \
            --rawfile diff pr_diff.txt \
            --arg prompt "你是一位专业的全栈代码审查员。请审查以下 Pull Request 的代码变更，重点关注：\n1. 代码质量和可读性\n2. 潜在的安全漏洞（如 SQL 注入、XSS、命令注入等）\n3. 性能问题\n4. 是否符合项目规范（Vue 3 Composition API、FastAPI、Python 类型注解等）\n5. 是否有更好的实现方式\n\n请以中文回复，格式如下：\n- ✅ 通过的方面\n- ⚠️ 需要关注的问题\n- ❌ 必须修复的问题\n- 💡 改进建议\n\n代码变更：\n\n" \
            '{
              model: "kimi-k2",
              max_tokens: 4096,
              messages: [
                {
                  role: "user",
                  content: ($prompt + $diff)
                }
              ]
            }' > request.json

          curl -s -X POST https://api.moonshot.cn/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $MOONSHOT_API_KEY" \
            -d @request.json > response.json

          # Debug: print response if extraction fails
          TEXT=$(jq -r '.choices[0].message.content // empty' response.json)
          if [ -z "$TEXT" ]; then
            echo "AI 审查调用异常，原始响应：" > review_result.txt
            cat response.json >> review_result.txt
          else
            echo "$TEXT" > review_result.txt
          fi

      - name: Post review comment
        if: steps.diff.outputs.has_diff == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review = '';
            try {
              review = fs.readFileSync('review_result.txt', 'utf8');
            } catch (e) {
              review = 'AI 审查结果读取失败。';
            }
            if (!review.trim()) {
              review = 'AI 审查未返回结果。';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🤖 AI 代码审查结果\n\n' + review
            });
